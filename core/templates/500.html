{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера — 500</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body data-theme="light">
    <div class="sheet-narrow center" style="padding-top:80px; padding-bottom:80px;">
        <div class="mono" style="font-size:11px; letter-spacing:.32em; color:var(--ink-faded);">ERROR · PRESSES UNDER MAINTENANCE</div>
        <div class="display" style="font-size:clamp(120px, 20vw, 240px); font-weight:900; line-height:.9; letter-spacing:-.04em; color:var(--accent); margin:16px 0;">500</div>
        <h1 class="display" style="font-size:clamp(28px, 4vw, 44px); font-weight:700; margin:0 0 14px;">Ошибка сервера</h1>
        <p class="serif" style="font-size:17px; line-height:1.7; color:var(--ink-soft); max-width:540px; margin:0 auto 26px;">
            Произошла внутренняя ошибка. Мы уже работаем над её исправлением. Пожалуйста, попробуйте позже.
        </p>
        <div class="flex justify-center gap-3 flex-wrap">
            <a href="/" class="btn-edit solid">На главную →</a>
            <a href="javascript:history.back()" class="btn-edit">← Назад</a>
        </div>
    </div>
</body>
</html>
